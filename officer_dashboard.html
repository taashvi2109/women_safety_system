<!DOCTYPE html>
<html>
<head>
    <title>Officer Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #6a5acd, #8a2be2);
            height: 100vh;
        }

        .container {
            text-align: center;
            padding-top: 80px;
        }

        h2 {
            color: white;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            width: 280px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #6a5acd;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a4ccc;
        }

        .logout {
            margin-top: 40px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Welcome Officer {{ session['user'] }} 👮</h2>

    <div class="card">
        <h3>📄 Assigned Complaints</h3>
        <p>View complaints assigned to you</p>

        <a href="/officer_complaints">
            <button>View</button>
        </a>
    </div>

    <div class="logout">
        <a href="/logout">
            <button style="width:200px;">Logout</button>
        </a>
    </div>

</div>

</body>
</html>
