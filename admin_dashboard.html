<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #6a5acd, #8a2be2);
            height: 100vh;
        }

        .container {
            text-align: center;
            padding-top: 50px;
        }

        h2 {
            color: white;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 230px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #6a5acd;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a4ccc;
        }

        .logout {
            margin-top: 40px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Welcome Admin 👑</h2>

    <div class="card-container">

        <div class="card">
            <h3>👥 Users</h3>
            <p>View all users</p>
            <a href="/users"><button>Open</button></a>
        </div>

        <div class="card">
            <h3>👮 Officers</h3>
            <p>Manage officers</p>
            <a href="/officers"><button>Open</button></a>
        </div>

        <div class="card">
            <h3>📋 Complaints</h3>
            <p>View all complaints</p>
            <a href="/view"><button>View</button></a>
        </div>

        <div class="card">
            <h3>📌 Assign</h3>
            <p>Assign complaints</p>
            <a href="/assign"><button>Assign</button></a>
        </div>

    </div>

    <div class="logout">
        <a href="/logout">
            <button style="width:200px;">Logout</button>
        </a>
    </div>

</div>

</body>
</html>
