<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #6a5acd, #8a2be2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            color: #6a5acd;
        }

        p {
            margin: 15px 0;
        }

        button {
            padding: 10px 20px;
            background: #6a5acd;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a4ccc;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>✅ Thank You!</h2>

    <p>Your complaint has been registered successfully.</p>
    <p>It will be resolved soon.</p>

    <a href="/user_dashboard">
        <button>Back to Dashboard</button>
    </a>

</div>

</body>
</html>
