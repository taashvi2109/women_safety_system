<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #6a5acd, #8a2be2);
            height: 100vh;
        }

        .container {
            text-align: center;
            padding-top: 60px;
        }

        h2 {
            color: white;
        }

        /* GRID FIX FOR PERFECT ALIGNMENT */
        .card-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            justify-items: center;
            margin-top: 50px;
            padding: 0 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 250px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #6a5acd;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a4ccc;
        }

        .logout {
            margin-top: 50px;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .card-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .card-container {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Welcome {{ session['user'] }} 👤</h2>

    <div class="card-container">

        <div class="card">
            <h3>📝 File Complaint</h3>
            <p>Report any issue</p>
            <a href="/complaint">
                <button>Go</button>
            </a>
        </div>

        <div class="card">
            <h3>📄 My Complaints</h3>
            <p>Check status</p>
            <a href="/my_complaints">
                <button>View</button>
            </a>
        </div>

        <div class="card">
            <h3>⭐ Feedback</h3>
            <p>Give feedback after resolution</p>
            <a href="/feedback">
                <button>Give</button>
            </a>
        </div>

    </div>

    <div class="logout">
        <a href="/logout">
            <button style="width:200px;">Logout</button>
        </a>
    </div>

</div>

</body>
</html>
