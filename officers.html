<!DOCTYPE html>
<html>
<head>
<title>Officers</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="sidebar">
    <a href="/dashboard">Dashboard</a>
    <a href="/officers">Officers</a>
</div>

<div class="main">
    <h2>Officers</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
